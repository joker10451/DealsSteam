app = "game-deals-bot"
primary_region = "ams"

[build]

[env]
  PYTHONUNBUFFERED = "1"

# Бот не слушает HTTP — отключаем health checks
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "bot_data"
  destination = "/app/data"
